<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мобильная версия - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Стили для мобильного устройства 390x844 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Имитация экрана смартфона */
        .phone-frame {
            width: 390px;
            height: 844px;
            margin: 20px auto;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя панель с датчиками */
        .status-bar {
            background: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        /* Шапка приложения */
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
        }

        .app-header h1 {
            font-size: 20px;
            margin: 0;
        }

        .app-header p {
            font-size: 12px;
            margin: 5px 0 0 0;
            opacity: 0.9;
        }

        /* Основной контент */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .form-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 3px;
            color: #666;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Нижняя навигация */
        .bottom-nav {
            background: white;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
        }

        .nav-item {
            text-align: center;
            color: #999;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }

        .nav-item.active {
            color: #667eea;
        }

        /* Сообщения */
        .alert {
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <!-- Верхняя панель -->
        <div class="status-bar">
            <span>9:41</span>
            <span>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </span>
        </div>

        <!-- Шапка приложения -->
        <div class="app-header">
            <h1><i class="fas fa-graduation-cap"></i> Корочки.есть</h1>
            <p>Вход в систему</p>
        </div>

        <!-- Основной контент -->
        <div class="app-content">
            <div class="form-card">
                <h2>Вход в аккаунт</h2>

                <!-- Демонстрация успешной регистрации -->
                <div class="alert alert-success">
                    <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
                    <i class="fas fa-check-circle"></i> Регистрация прошла успешно! Теперь войдите в систему.
                </div>

                <!-- Демонстрация ошибки входа -->
                <div class="alert alert-danger">
                    <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
                    <i class="fas fa-exclamation-circle"></i> Неверный логин или пароль
                </div>

                <form>
                    <div class="form-group">
                        <label for="login">Логин</label>
                        <input type="text" class="form-control" id="login" placeholder="Введите ваш логин"
                            value="user123">
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" class="form-control" id="password" placeholder="Введите ваш пароль">
                    </div>

                    <button type="button" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>

                <p style="text-align: center; margin-top: 15px; font-size: 12px;">
                    Еще не зарегистрированы? <a href="#" style="color: #667eea;">Создать аккаунт</a>
                </p>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <a href="#" class="nav-item">
                <i class="fas fa-home"></i>
                Главная
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-user-plus"></i>
                Регистрация
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-sign-in-alt"></i>
                Вход
            </a>
        </div>
    </div>
    <script>
        // hide alerts when close button clicked
        document.querySelectorAll('.alert .close-btn').forEach(function (btn) {
            btn.addEventListener('click', function () { this.parentElement.style.display = 'none'; });
        });
    </script>
</body>

</html>
